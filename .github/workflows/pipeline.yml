  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6        
        with:          
          node-version: lts/*
      - name: Install dependencies        
        run: npm install; npm --prefix server install

      - name: Run test        
        run: npm --prefix server run test
  
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6        
        with:          
          node-version: lts/*
      - name: Install dependencies        
        run: npm install; npm --prefix server install; npm --prefix client install
      - name: Check style        
        run: npm run lint --prefix server; npm run lint --prefix client
  
  build_and_deploy:
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6        
        with:          
          node-version: lts/*
      - name: Install dependencies        
        run: npm install; npm --prefix server install; npm --prefix client install
      - name: Install ci dependencies
        run: npm ci
      - name: Build app
        run: npm run build
      - name: Start app
        run: npm run start *
      - name: echo "App is running, starting deployment.."
        run: echo "App is running, starting deployment.."
  
